<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Epick Mobile</title>
<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:sans-serif;}
#menu {
  position: fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index: 2000;
}

 #ui{
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 99999;
  display:flex;
  flex-direction:column;
}

#ui button{
  width:70px;
  height:70px;
  margin:5px;
  border:none;
  border-radius:50%;
  background:#222;
  color:white;
  font-size:24px;
  opacity:0.9;
}   
  
button {
  padding:10px; margin:5px;
  background:#444; color:white; border:none;
}
  
canvas{
  display:block;
  position:fixed;
  top:0;
  left:0;
  z-index:1;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Pilih Hero</h1>
  <button onclick="startGame('andi')">Andi_Pro</button>
  <button onclick="startGame('orbu')">Orbu</button>
  <button onclick="startGame('tor')">Torbandolok</button>
  <button onclick="startGame('sir')">Sirandos</button>
</div>

<canvas id="game"></canvas>

  <div id="ui">
  <button onclick="skill1()">1</button>
  <button onclick="skill2()">2</button>
  <button onclick="skill3()">3</button>
  <button onclick="skill4()">4</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

// config kamu (sudah benar)
const firebaseConfig = {
  apiKey: "AIzaSyDfluh_N9DWM6EpLolpa_CYuCKBrAdulvk",
  authDomain: "epick-mobile.firebaseapp.com",
  projectId: "epick-mobile",
  storageBucket: "epick-mobile.firebasestorage.app",
  messagingSenderId: "85157678826",
  appId: "1:85157678826:web:896779324f5638eb609193",
  measurementId: "G-J065HDMLBF"
};

// init
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ID unik player
const playerId = "p" + Math.floor(Math.random()*10000);

// contoh player

  let otherPlayers = {};

  let heroImages = {};

  onValue(ref(db, "players"), (snapshot) => {
  otherPlayers = snapshot.val() || {};

  for(let id in otherPlayers){
    let p = otherPlayers[id];

    if(!heroImages[id]){
      let img = new Image();

      if(p.hero === "andi"){
        img.src = "andi.png";
      }

      heroImages[id] = img;
    }
  }
});

// 🔥 KIRIM DATA KE FIREBASE
function sendData(){
  set(ref(db, "players/" + playerId), player);
}

window.startGame = function(hero){
  player.hero = hero;
  document.getElementById("menu").style.display="none";

  // 🔥 load gambar hero
  if(hero === "andi"){
    heroImg.src = "andi.png"; // nanti kamu ganti sesuai file kamu
  }

  setInterval(sendData, 100);
  gameLoop();
}  

// 🔥 AMBIL DATA PLAYER LAIN
onValue(ref(db, "players"), (snapshot) => {
  const data = snapshot.val();
  console.log("SEMUA PLAYER:", data);
});

// 🔥 HAPUS SAAT KELUAR
window.addEventListener("beforeunload", ()=>{
  remove(ref(db, "players/" + playerId));
});

 // map size
const mapWidth = 2000;
const mapHeight = 2000;

let obstacles = []; // batu (nabrak)
let bushes = [];    // semak (sembunyi)
let rivers = [];    // sungai (speed)
  
  let bases = [
  {x:100, y:100, color:"blue"},
  {x:1800, y:1800, color:"red"}
];

// fungsi random terrain (halus, bukan kotak)
function getTerrain(x, y){
  let n = Math.sin(x * 0.01) + Math.cos(y * 0.01);

  if(n > 1) return "rock";
  if(n > 0.3) return "grass";
  if(n > -0.2) return "dirt";
  if(n > -0.6) return "sand";
  return "water";
}

  function generateMap(){
  // batu random
  for(let i=0;i<50;i++){
    obstacles.push({
      x: Math.random()*mapWidth,
      y: Math.random()*mapHeight,
      size: 40
    });
  }

  // semak random
  for(let i=0;i<40;i++){
    bushes.push({
      x: Math.random()*mapWidth,
      y: Math.random()*mapHeight,
      size: 35
    });
  }

  // sungai (garis horizontal)
  for(let i=0;i<200;i++){
    rivers.push({
      x: i*20,
      y: 900,
      size: 20
    });
  }
  }
  
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

  let camera = { x: 0, y: 0 };

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

  let heroImg = new Image();

  generateMap();

window.onerror = function(msg, url, line){
  console.log("ERROR:", msg, "di baris:", line);
};
  
  
let player = {
  x:200,
  y:200,
  size:30,
  speed:3,
  hero:"",
  hp:100
};

  function skill1(){ console.log("Skill 1"); }
function skill2(){ console.log("Skill 2"); }
function skill3(){ console.log("Skill 3"); }
function skill4(){ console.log("Skill 4"); }

  window.addEventListener("keydown", e=>{
  if(e.key === "1") skill1();
  if(e.key === "2") skill2();
  if(e.key === "3") skill3();
  if(e.key === "4") skill4();
});

  function isInBush(px, py){
  for(let b of bushes){
    let dx = px - b.x;
    let dy = py - b.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < b.size){
      return true;
    }
  }
  return false;
  }

  let waves = [];
let projectiles = [];

let joystick = {
  active: false,
  startX: 0,
  startY: 0,
  dx: 0,
  dy: 0
};

// joystick
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  let t = e.touches[0];
  joystick.active = true;
  joystick.startX = t.clientX;
  joystick.startY = t.clientY;
});

canvas.addEventListener("touchmove", e=>{
  e.preventDefault();
  if(!joystick.active) return;

  let t = e.touches[0];
  joystick.dx = (t.clientX - joystick.startX) / 40;
  joystick.dy = (t.clientY - joystick.startY) / 40;
});

canvas.addEventListener("touchend", ()=>{
  joystick.active = false;
  joystick.dx = 0;
  joystick.dy = 0;
});

// skill
function useSkill(){
  if(player.hero==="andi"){
    player.hp += 5; // serap hp
  }
  if(player.hero==="orbu"){
    player.speed = 6; // jadi mobil
    setTimeout(()=>player.speed=3,2000);
  }
  if(player.hero==="tor"){
    alert("Ular keluar! (demo)");
  }
  if(player.hero==="sir"){
    alert("Magnet aktif! (demo)");
  }
}

window.addEventListener("click", useSkill);

function update(){
  // gerak
  if(joystick.active){
    player.x += joystick.dx * player.speed;
    player.y += joystick.dy * player.speed;
  }

  // batas map
  if(player.x < 0) player.x = 0;
  if(player.y < 0) player.y = 0;
  if(player.x > mapWidth) player.x = mapWidth;
  if(player.y > mapHeight) player.y = mapHeight;

  // 🪨 collision batu
  for(let o of obstacles){
    let dx = player.x - o.x;
    let dy = player.y - o.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let minDist = o.size + player.size;

    if(dist < minDist){
      let angle = Math.atan2(dy, dx);
      player.x = o.x + Math.cos(angle) * minDist;
      player.y = o.y + Math.sin(angle) * minDist;
    }
  }

  // 🏰 collision benteng
for(let b of bases){

  let baseSize = 60;

  if(
    player.x + player.size > b.x &&
    player.x - player.size < b.x + baseSize &&
    player.y + player.size > b.y &&
    player.y - player.size < b.y + baseSize
  ){

    // dorong keluar dari benteng
    if(player.x < b.x){
      player.x = b.x - player.size;
    }

    if(player.x > b.x + baseSize){
      player.x = b.x + baseSize + player.size;
    }

    if(player.y < b.y){
      player.y = b.y - player.size;
    }

    if(player.y > b.y + baseSize){
      player.y = b.y + baseSize + player.size;
    }
  }
}

  // 🌊 river speed
  let inRiver = false;
  for(let r of rivers){
    let dx = player.x - r.x;
    let dy = player.y - r.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < r.size){
      inRiver = true;
    }
  }

  if(inRiver){
    player.speed = 5;
  } else {
    player.speed = 3;
  }

  // kamera
  camera.x = player.x - canvas.width / 2;
  camera.y = player.y - canvas.height / 2;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 🌍 TANAH (background)
  ctx.fillStyle = "#6b8e23";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 🌊 SUNGAI
  for(let r of rivers){
    ctx.fillStyle = "#2c6fa3";
    ctx.beginPath();
    ctx.arc(r.x - camera.x, r.y - camera.y, r.size, 0, Math.PI*2);
    ctx.fill();
  }

  // 🌿 SEMAK
  for(let b of bushes){
    ctx.fillStyle = "#1e4d2b";
    ctx.beginPath();
    ctx.arc(b.x - camera.x, b.y - camera.y, b.size, 0, Math.PI*2);
    ctx.fill();
  }

  // 🪨 BATU
  for(let o of obstacles){
    ctx.fillStyle = "#777";
    ctx.beginPath();
    ctx.arc(o.x - camera.x, o.y - camera.y, o.size, 0, Math.PI*2);
    ctx.fill();
  }

  // 🧱 BATAS MAP
  ctx.fillStyle = "#555";
  ctx.fillRect(-camera.x, -camera.y, 20, mapHeight);
  ctx.fillRect(mapWidth - camera.x, -camera.y, 20, mapHeight);
  ctx.fillRect(-camera.x, -camera.y, mapWidth, 20);
  ctx.fillRect(-camera.x, mapHeight - camera.y, mapWidth, 20);

  // 🌿 cek apakah player di semak
let inBush = false;

for(let b of bushes){
  let dx = player.x - b.x;
  let dy = player.y - b.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < b.size){
    inBush = true;
  }
}

// kalau di semak → transparan
if(inBush){
  ctx.globalAlpha = 0.3;
}

  // 🔴 PLAYER
  if(heroImg.complete){
    ctx.drawImage(
      heroImg,
      player.x - camera.x - 25,
      player.y - camera.y - 25,
      50,
      50
    );
  } else {
    // fallback kalau gambar belum load
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(player.x - camera.x, player.y - camera.y, 20, 0, Math.PI*2);
    ctx.fill();
  }

  // 🔵 PLAYER LAIN
  for(let id in otherPlayers){
    let p = otherPlayers[id];
    if(id !== playerId){
      let img = heroImages[id];
      if(img && img.complete){
        ctx.drawImage(
          img,
          p.x - camera.x - 25,
          p.y - camera.y - 25,
          50,
          50
        );
      }
    }
  }

  // 🏰 BASE
  for(let b of bases){
    ctx.fillStyle = b.color;
    ctx.fillRect(
      b.x - camera.x,
      b.y - camera.y,
      60, 60
    );
  }

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Hero: "+player.hero,10,20);
  ctx.fillText("HP: "+player.hp,10,40);

// 🎮 JOYSTICK VISUAL
if(joystick.active){
  ctx.globalAlpha = 0.5;

  // lingkar luar
  ctx.beginPath();
  ctx.arc(joystick.startX, joystick.startY, 40, 0, Math.PI*2);
  ctx.fillStyle = "white";
  ctx.fill();

  // stick
  ctx.beginPath();
  ctx.arc(
    joystick.startX + joystick.dx * 20,
    joystick.startY + joystick.dy * 20,
    20,
    0,
    Math.PI*2
  );
  ctx.fillStyle = "gray";
  ctx.fill();

  ctx.globalAlpha = 1;
}
  
}
 
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
