<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Epick Mobile</title>
<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:sans-serif;}
#menu {

<body>

<div id="menu">
  <h1>Pilih Hero</h1>
  <button onclick="startGame('andi')">Andi_Pro</button>
  <button onclick="startGame('orbu')">Orbu</button>
  <button onclick="startGame('tor')">Torbandolok</button>
  <button onclick="startGame('sir')">Sirandos</button>
</div>

<canvas id="game"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

// config kamu (sudah benar)
const firebaseConfig = {
  apiKey: "AIzaSyDfluh_N9DWM6EpLolpa_CYuCKBrAdulvk",
  authDomain: "epick-mobile.firebaseapp.com",
  projectId: "epick-mobile",
  storageBucket: "epick-mobile.firebasestorage.app",
  messagingSenderId: "85157678826",
  appId: "1:85157678826:web:896779324f5638eb609193",
  measurementId: "G-J065HDMLBF"
};

// init
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ID unik player
const playerId = "p" + Math.floor(Math.random()*10000);

// contoh player

  let otherPlayers = {};

onValue(ref(db, "players"), (snapshot) => {
  otherPlayers = snapshot.val() || {};
});

// 🔥 KIRIM DATA KE FIREBASE
function sendData(){
  set(ref(db, "players/" + playerId), player);
}

  window.startGame = function(hero){
  player.hero = hero;
  document.getElementById("menu").style.display="none";
    
  gameLoop();
  }

  setInterval(sendData, 100);

// 🔥 AMBIL DATA PLAYER LAIN
onValue(ref(db, "players"), (snapshot) => {
  const data = snapshot.val();
  console.log("SEMUA PLAYER:", data);
});

// 🔥 HAPUS SAAT KELUAR
window.addEventListener("beforeunload", ()=>{
  remove(ref(db, "players/" + playerId));
});

 // map size
const mapWidth = 2000;
const mapHeight = 2000;

  let bases = [
  {x:100, y:100, color:"blue"},
  {x:1800, y:1800, color:"red"}
];

// fungsi random terrain (halus, bukan kotak)
function getTerrain(x, y){
  let n = Math.sin(x * 0.01) + Math.cos(y * 0.01);

  if(n > 1) return "rock";
  if(n > 0.3) return "grass";
  if(n > -0.2) return "dirt";
  if(n > -0.6) return "sand";
  return "water";
} 
  
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

  let camera = { x: 0, y: 0 };

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x:200,
  y:200,
  size:30,
  speed:3,
  hero:"",
  hp:100
};

let joystick = {
  active: false,
  startX: 0,
  startY: 0,
  dx: 0,
  dy: 0
};

// joystick
canvas.addEventListener("touchstart", e=>{
  let t = e.touches[0];
  joystick.active = true;
  joystick.startX = t.clientX;
  joystick.startY = t.clientY;
});

canvas.addEventListener("touchmove", e=>{
  if(!joystick.active) return;

  let t = e.touches[0];

  joystick.dx = (t.clientX - joystick.startX) / 40;
  joystick.dy = (t.clientY - joystick.startY) / 40;
});

canvas.addEventListener("touchend", ()=>{
  joystick.active = false;
  joystick.dx = 0;
  joystick.dy = 0;
});

  function update(){
  if(joystick.active){
    player.x += joystick.dx * player.speed;
    player.y += joystick.dy * player.speed;
  }
  }

// skill
function useSkill(){
  if(player.hero==="andi"){
    player.hp += 5; // serap hp
  }
  if(player.hero==="orbu"){
    player.speed = 6; // jadi mobil
    setTimeout(()=>player.speed=3,2000);
  }
  if(player.hero==="tor"){
    alert("Ular keluar! (demo)");
  }
  if(player.hero==="sir"){
    alert("Magnet aktif! (demo)");
  }
}

window.addEventListener("click", useSkill);

function update(){
  if(joystick.active){
    player.x += joystick.dx * player.speed;
    player.y += joystick.dy * player.speed;
  }
  camera.x = player.x - canvas.width / 2;
camera.y = player.y - canvas.height / 2;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // gambar arena random
if(type === "grass"){
  ctx.fillStyle = "#2ecc71";
  ctx.fillRect(x - camera.x, y - camera.y, 20, 20);

  // detail rumput
  ctx.fillStyle = "#27ae60";
  ctx.fillRect(x - camera.x + 5, y - camera.y + 5, 5, 5);
}

else if(type === "water"){
  ctx.fillStyle = "#3498db";
  ctx.fillRect(x - camera.x, y - camera.y, 20, 20);

  ctx.fillStyle = "#5dade2";
  ctx.fillRect(x - camera.x + 3, y - camera.y + 3, 10, 5);
}

else if(type === "rock"){
  ctx.fillStyle = "#7f8c8d";
  ctx.beginPath();
  ctx.arc(x - camera.x + 10, y - camera.y + 10, 8, 0, Math.PI*2);
  ctx.fill();
}

  else if(type === "dirt"){
  ctx.fillStyle = "#8e5a2b";
  ctx.fillRect(x - camera.x, y - camera.y, 20, 20);
}

else if(type === "sand"){
  ctx.fillStyle = "#f1c40f";
  ctx.fillRect(x - camera.x, y - camera.y, 20, 20);
}

    if(type === "grass") ctx.fillStyle = "#2ecc71";
    else if(type === "dirt") ctx.fillStyle = "#8e5a2b";
    else if(type === "sand") ctx.fillStyle = "#f1c40f";
    else if(type === "water") ctx.fillStyle = "#3498db";
    else if(type === "rock") ctx.fillStyle = "#7f8c8d";

    ctx.fillRect(x - camera.x, y - camera.y, 20, 20);
  }
}

  // player
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(
  player.x - camera.x,
  player.y - camera.y,
  player.size,
  0,
  Math.PI*2
);
  ctx.fill();

  for(let id in otherPlayers){
  let p = otherPlayers[id];

  if(id !== playerId){
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(
  p.x - camera.x,
  p.y - camera.y,
  25,
  0,
  Math.PI*2
);
    ctx.fill();
  }
}

  for(let b of bases){
  ctx.fillStyle = b.color;
  ctx.fillRect(
    b.x - camera.x,
    b.y - camera.y,
    60, 60
  );
  }

  // info
  ctx.fillStyle="white";
  ctx.fillText("Hero: "+player.hero,10,20);
  ctx.fillText("HP: "+player.hp,10,40);
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
