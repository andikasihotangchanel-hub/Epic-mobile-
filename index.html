function getTerrain(x, y){
  let n = Math.sin(x * 0.01) + Math.cos(y * 0.01);

  if(n > 1) return "rock";
  if(n > 0.3) return "grass";
  if(n > -0.2) return "dirt";
  if(n > -0.6) return "sand";
  return "water";
}

  joystick.dy = (t.clientY - joystick.startY) / 40;
});

function update(){
  // gerak
  if(joystick.active){
    player.x += joystick.dx * player.speed;
    player.y += joystick.dy * player.speed;
  }

  // batas map
  if(player.x < 0) player.x = 0;
  if(player.y < 0) player.y = 0;
  if(player.x > mapWidth) player.x = mapWidth;
  if(player.y > mapHeight) player.y = mapHeight;

  // 🪨 collision batu
  for(let o of obstacles){
    let dx = player.x - o.x;
    let dy = player.y - o.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let minDist = o.size + player.size;

    if(dist < minDist){
      let angle = Math.atan2(dy, dx);
      player.x = o.x + Math.cos(angle) * minDist;
      player.y = o.y + Math.sin(angle) * minDist;
    }
  }

  // 🏰 collision benteng
for(let b of bases){

  let baseSize = 60;

  if(
    player.x + player.size > b.x &&
    player.x - player.size < b.x + baseSize &&
    player.y + player.size > b.y &&
    player.y - player.size < b.y + baseSize
  ){

    // dorong keluar dari benteng
    if(player.x < b.x){
      player.x = b.x - player.size;
    }

    if(player.x > b.x + baseSize){
      player.x = b.x + baseSize + player.size;
    }

    if(player.y < b.y){
      player.y = b.y - player.size;
    }

    if(player.y > b.y + baseSize){
      player.y = b.y + baseSize + player.size;
    }
  }
}

  // asap
for(let p of particles){

  p.x += p.dx;
  p.y += p.dy;

  p.life--;
}

particles = particles.filter(p => p.life > 0);

  // 🌊 river speed
  let inRiver = false;
  for(let r of rivers){
    let dx = player.x - r.x;
    let dy = player.y - r.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < r.size){
      inRiver = true;
    }
  }

  if(inRiver){
    player.speed = 5;
  } else {
    player.speed = 3;
  }

  // update animasi attack
for(let a of attacks){

  a.radius += 3;
  a.life--;

}

attacks = attacks.filter(a => a.life > 0);

// 🔫 benteng auto attack

          x:b.x + 30,

          dx:dx/dist,
          dy:dy/dist,
          speed:6,
          target:id
        });

      }

    

  }

  // serang player sendiri
  if(player.team !== b.team){

    let dx = player.x - b.x;
    let dy = player.y - b.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 250){

          x:b.x + 30,
          y:b.y + 30,
          dx:dx/dist,
          dy:dy/dist,
          speed:6,
          target:"player"
        });

      }

    }

  }

  }
  
  // jangan serang tim sendiri
  if(b.team === player.team) continue;

  // kalau sudah hancur skip
  if(b.destroyed) continue;

  let dx = player.x - b.x;
  let dy = player.y - b.y;

  let dist = Math.sqrt(dx*dx + dy*dy);

  // jarak serang
  if(dist < 120){

    b.hp -= 10;

    // animasi attack
    attacks.push({
      x:b.x + 30,
      y:b.y + 30,
      radius:20,
      life:10
    });

    // hancur
    if(b.hp <= 0){

      b.destroyed = true;

      for(let i=0;i<30;i++){

        particles.push({
          x:b.x + 30,
          y:b.y + 30,
          dx:(Math.random()-0.5)*5,
          dy:(Math.random()-0.5)*5,
          life:60
        });

      }

      alert("FINISH");

// reset benteng
for(let b of bases){
  b.hp = 100;
  b.destroyed = false;
}

// reset player
player.hp = 100;

if(player.team === "blue"){
  player.x = 150;
  player.y = 150;
}else{
  player.x = 1700;
  player.y = 1700;
}

// kembali ke lobby
document.getElementById("menu").style.display = "flex";
      
    }
  }
}


 // update peluru benteng
for(let bullet of baseBullets){

  bullet.x += bullet.dx * bullet.speed;
  bullet.y += bullet.dy * bullet.speed;

  let dx = player.x - bullet.x;
  let dy = player.y - bullet.y;

  let dist = Math.sqrt(dx*dx + dy*dy);

  // kena player sendiri
if(bullet.target === "player"){

    player.hp -= 1;
  }

}

// kena player lain
else{

  let enemy = otherPlayers[bullet.target];

  if(enemy){

    let ex = enemy.x - bullet.x;

}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 🌍 TANAH (background)
  ctx.fillStyle = "#6b8e23";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 🌊 SUNGAI
  for(let r of rivers){
    ctx.fillStyle = "#2c6fa3";
    ctx.beginPath();
    ctx.arc(r.x - camera.x, r.y - camera.y, r.size, 0, Math.PI*2);
    ctx.fill();
  }

  // 🌿 SEMAK
  for(let b of bushes){
    ctx.fillStyle = "#1e4d2b";
    ctx.beginPath();
    ctx.arc(b.x - camera.x, b.y - camera.y, b.size, 0, Math.PI*2);
    ctx.fill();
  }

  // 🪨 BATU
  for(let o of obstacles){
    ctx.fillStyle = "#777";
    ctx.beginPath();
    ctx.arc(o.x - camera.x, o.y - camera.y, o.size, 0, Math.PI*2);
    ctx.fill();
  }

  // 🧱 BATAS MAP
  ctx.fillStyle = "#555";
  ctx.fillRect(-camera.x, -camera.y, 20, mapHeight);
  ctx.fillRect(mapWidth - camera.x, -camera.y, 20, mapHeight);
  ctx.fillRect(-camera.x, -camera.y, mapWidth, 20);
  ctx.fillRect(-camera.x, mapHeight - camera.y, mapWidth, 20);

  // 🌿 cek apakah player di semak
let inBush = false;

for(let b of bushes){
  let dx = player.x - b.x;
  let dy = player.y - b.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < b.size){
    inBush = true;
  }
}

// kalau di semak → transparan
if(inBush){
  ctx.globalAlpha = 0.3;
}

  // 🔴 PLAYER
  if(heroImg.complete){
    ctx.drawImage(
      heroImg,
      player.x - camera.x - 25,
      player.y - camera.y - 25,
      50,
      50
    );

// HP BAR PLAYER SENDIRI
ctx.fillStyle = "red";

ctx.fillRect(
  player.x - camera.x - 20,
  player.y - camera.y - 35,
  40,
  6
);

ctx.fillStyle = "lime";

ctx.fillRect(
  player.x - camera.x - 20,
  player.y - camera.y - 35,
  (player.hp / 100) * 40,
  6
);
    
  } else {
    // fallback kalau gambar belum load
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(player.x - camera.x, player.y - camera.y, 20, 0, Math.PI*2);
    ctx.fill();
  }

  // 🔵 PLAYER LAIN
  for(let id in otherPlayers){
    let p = otherPlayers[id];
    if(id !== playerId){
      let img = heroImages[id];
      if(img && img.complete){
        ctx.drawImage(
          img,
          p.x - camera.x - 25,
          p.y - camera.y - 25,
          50,
          50
        );

// HP BAR PLAYER
ctx.fillStyle = "red";

ctx.fillRect(
  p.x - camera.x - 20,
  p.y - camera.y - 35,
  40,
  6
);

ctx.fillStyle = "lime";

ctx.fillRect(
  p.x - camera.x - 20,
  p.y - camera.y - 35,
  (p.hp / 100) * 40,
  6
);
        
      }
    }
  }

  // 🏰 BASE
for(let b of bases){

  if(!b.destroyed){

    ctx.fillStyle = b.color;

    ctx.fillRect(
      b.x - camera.x,
      b.y - camera.y,
      60,
      60
    );

    // HP BAR
    ctx.fillStyle = "red";

    ctx.fillRect(
      b.x - camera.x,
      b.y - camera.y - 15,
      60,
      8
    );

      b.y - camera.y - 15,

}

  // 🔫 bullet benteng
for(let bullet of baseBullets){

  ctx.fillStyle = "yellow";

  ctx.beginPath();

  ctx.arc(
    bullet.x - camera.x,
    bullet.y - camera.y,
    5,
    0,
    Math.PI*2
  );

  ctx.fill();

}

  // 💨 partikel asap
for(let p of particles){

  ctx.globalAlpha = p.life / 60;

  ctx.fillStyle = "gray";

  ctx.beginPath();

  ctx.arc(
    p.x - camera.x,
    p.y - camera.y,
    10,
    0,
    Math.PI*2
  );

  ctx.fill();

}

ctx.globalAlpha = 1;
  

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Hero: "+player.hero,10,20);
  ctx.fillText("HP: "+player.hp,10,40);

// ⚡ ANIMASI ATTACK
for(let a of attacks){

  ctx.globalAlpha = a.life / 15;

  ctx.strokeStyle = "orange";
  ctx.lineWidth = 4;

  ctx.beginPath();

  ctx.arc(
    a.x - camera.x,
    a.y - camera.y,
    a.radius,
    0,
    Math.PI * 2
  );

  ctx.stroke();
}

ctx.globalAlpha = 1;
  

// 🎮 JOYSTICK VISUAL
if(joystick.active){
  ctx.globalAlpha = 0.5;

  // lingkar luar
  ctx.beginPath();
  ctx.arc(joystick.startX, joystick.startY, 40, 0, Math.PI*2);
  ctx.fillStyle = "white";
  ctx.fill();

  // stick
  ctx.beginPath();
  ctx.arc(
    joystick.startX + joystick.dx * 20,
    joystick.startY + joystick.dy * 20,
    20,
    0,
    Math.PI*2
  );
  ctx.fillStyle = "gray";
  ctx.fill();

  ctx.globalAlpha = 1;
}
  
}
 
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

  gameLoop();
  
</script>

</body>
</html>
